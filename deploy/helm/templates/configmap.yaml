apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sozu-gateway.fullname" . }}-sozu
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
data:
  config.toml: |
    # Rendered by Helm — keep in sync with deploy/sozu/config.toml.
    command_socket = "/run/sozu/sozu.sock"
    command_buffer_size = 163_840
    max_command_buffer_size = 1_638_400

    log_level = "{{ .Values.sozu.logLevel }}"
    log_target = "stdout"

    worker_count = {{ .Values.sozu.workerCount }}
    worker_automatic_restart = true
    handle_process_affinity = false

    buffer_size = 16_393
    max_connections = 10_000

    pid_file_path = "/run/sozu/sozu.pid"
    activate_listeners = true

    [[listeners]]
    protocol = "http"
    address = "0.0.0.0:{{ .Values.sozu.httpPort }}"

    [[listeners]]
    protocol = "https"
    address = "0.0.0.0:{{ .Values.sozu.httpsPort }}"
    tls_versions = ["TLS_V12", "TLS_V13"]
