apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sozu-gateway.fullname" . }}
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # An edge proxy must never dip below capacity during an upgrade: bring one
  # new Pod up (and let readiness gate it on programmed routes) before any
  # old one is taken down.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "sozu-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sozu-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod when the Sōzu config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "sozu-gateway.serviceAccountName" . }}
      # The ServiceAccount can read Secrets cluster-wide; the data-plane
      # container parses untrusted network input and must never hold that
      # credential. The token (plus CA and namespace, which in-cluster API
      # clients need) is projected into the controller container only.
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.runAsUser }}
        runAsGroup: {{ .Values.runAsUser }}
        fsGroup: {{ .Values.runAsUser }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        # --- data plane -------------------------------------------------------
        - name: sozu
          image: "{{ .Values.image.sozu.repository }}:{{ .Values.image.sozu.tag }}"
          imagePullPolicy: {{ .Values.image.sozu.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # Sōzu writes its socket/pid under /run/sozu and — when forking a
            # worker — serializes its state through a temporary file in /tmp;
            # both are explicit mounted volumes below, so the root filesystem
            # itself can be sealed like the controller's.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args: ["start", "-c", "/etc/sozu/config.toml"]
          ports:
            - name: http
              containerPort: {{ .Values.sozu.httpPort }}
            - name: https
              containerPort: {{ .Values.sozu.httpsPort }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          # Readiness only de-pools the Pod from the Service; a wedged-but-alive
          # proxy is never restarted by it. Liveness closes that gap (thresholds
          # in line with the controller's below).
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: sozu-run
              mountPath: /run/sozu
            - name: sozu-config
              mountPath: /etc/sozu
            # Worker forks fail on a sealed rootfs without it: the state
            # handoff to the new worker goes through a temp file in /tmp.
            - name: sozu-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.sozu | nindent 12 }}
        # --- control plane ----------------------------------------------------
        - name: controller
          {{- if .Values.image.controller.digest }}
          image: "{{ .Values.image.controller.repository }}@{{ .Values.image.controller.digest }}"
          {{- else }}
          image: "{{ .Values.image.controller.repository }}:{{ .Values.image.controller.tag | default .Chart.AppVersion }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.controller.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SOZU_GW_CLASS
              value: {{ .Values.ingressClass.name | quote }}
            - name: SOZU_GW_CONTROLLER
              value: {{ .Values.ingressClass.controllerValue | quote }}
            - name: SOZU_GW_SOCKET
              value: /run/sozu/sozu.sock
            - name: SOZU_GW_HTTP_LISTENER
              value: "0.0.0.0:{{ .Values.sozu.httpPort }}"
            - name: SOZU_GW_HTTPS_LISTENER
              value: "0.0.0.0:{{ .Values.sozu.httpsPort }}"
            # Advertised Gateway API listener ports: what a Gateway's
            # listeners[].port declares — the Service's client-facing ports,
            # which map onto the unprivileged pod binds above.
            - name: SOZU_GW_GATEWAY_HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: SOZU_GW_GATEWAY_HTTPS_PORT
              value: {{ .Values.service.httpsPort | quote }}
            - name: SOZU_GW_DEBOUNCE_MS
              value: {{ .Values.controller.debounceMs | quote }}
            - name: SOZU_GW_RESYNC_SECS
              value: {{ .Values.controller.resyncSecs | quote }}
            - name: SOZU_GW_HEALTH_LISTEN
              value: "0.0.0.0:{{ .Values.controller.healthPort | default 8081 }}"
            {{- if .Values.metrics.enabled }}
            - name: SOZU_GW_METRICS_LISTEN
              value: "0.0.0.0:{{ .Values.metrics.port }}"
            {{- end }}
            {{- if .Values.rbac.allowStatusWrites }}
            # Publish this gateway's LoadBalancer address into managed Ingresses'
            # .status (needs the ingresses/status grant gated by the same flag).
            - name: SOZU_GW_PUBLISH_SERVICE
              value: "{{ .Release.Namespace }}/{{ include "sozu-gateway.fullname" . }}"
            {{- end }}
            {{- if not .Values.rbac.allowGatewayStatusWrites }}
            # Without the */status grants every write would 403; tell the
            # controller to skip them instead of logging a failure per object
            # per reconcile.
            - name: SOZU_GW_GATEWAY_STATUS_WRITES
              value: "false"
            {{- end }}
            {{- if .Values.l4.tcpServices }}
            - name: SOZU_GW_TCP_SERVICES
              value: "{{ .Release.Namespace }}/{{ include "sozu-gateway.fullname" . }}-tcp-services"
            {{- end }}
            {{- if .Values.l4.udpServices }}
            - name: SOZU_GW_UDP_SERVICES
              value: "{{ .Release.Namespace }}/{{ include "sozu-gateway.fullname" . }}-udp-services"
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.controller.logLevel | quote }}
          ports:
            - name: health
              containerPort: {{ .Values.controller.healthPort | default 8081 }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            {{- end }}
          # Readiness only goes green once the controller has programmed Sōzu, so
          # a fresh Pod (start, rolling update, scale-out) takes no traffic until
          # its routes exist. Liveness is independent: it is up from boot.
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: sozu-run
              mountPath: /run/sozu
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          resources:
            {{- toYaml .Values.resources.controller | nindent 12 }}
      volumes:
        # tmpfs, not node disk: this volume carries the command socket, the
        # persisted shadow and Sōzu state dumps — material that must die with
        # the pod instead of lingering on the node's filesystem.
        - name: sozu-run
          emptyDir:
            medium: Memory
        # Sōzu's scratch space for the worker-fork state handoff (short-lived
        # temp files; same in-RAM, dies-with-the-pod reasoning as sozu-run).
        - name: sozu-tmp
          emptyDir:
            medium: Memory
        - name: sozu-config
          configMap:
            name: {{ include "sozu-gateway.fullname" . }}-sozu
        # Hand-rolled equivalent of the automounted token volume, so the
        # controller keeps API access while the sozu container gets none.
        - name: kube-api-access
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3607
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
