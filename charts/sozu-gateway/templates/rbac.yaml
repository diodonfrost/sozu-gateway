apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sozu-gateway.serviceAccountName" . }}
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sozu-gateway.fullname" . }}
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
{{- if .Values.rbac.allowStatusWrites }}
  # Ingress status reporting (Phase 2). Off by default for least-privilege.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sozu-gateway.fullname" . }}
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sozu-gateway.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sozu-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
