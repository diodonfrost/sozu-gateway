# Default values for the sozu-gateway add-on.

replicaCount: 1

image:
  controller:
    repository: ghcr.io/clevercloud/sozu-gateway-controller
    # Defaults to the chart appVersion when empty (set by the release workflow).
    tag: ""
    # When set (e.g. "sha256:…"), the image is pulled by digest instead of by
    # tag — immutable, so nobody can swap the content behind the reference.
    # The e2e suites use this for their throwaway ttl.sh images.
    digest: ""
    pullPolicy: IfNotPresent
  sozu:
    repository: clevercloud/sozu
    tag: "2.1.0"
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
# Singleton add-on: keep resource names stable regardless of release name.
fullnameOverride: "sozu-gateway"

# IngressClass this add-on creates and owns.
ingressClass:
  name: sozu
  # Mark as the cluster's default IngressClass (handles class-less Ingresses).
  default: false
  controllerValue: sozu.io/gateway-controller

controller:
  logLevel: info          # RUST_LOG (e.g. "info", "info,sozu_gw_controller=debug")
  debounceMs: 500         # coalesce bursts of watch events
  resyncSecs: 60          # periodic full resync; 0 disables it (Sōzu-restart
                          # detection then only runs on a command-socket reconnect)
  healthPort: 8081        # /healthz (liveness) + /readyz (readiness gated on first reconcile)

# Prometheus /metrics on the controller. Each scrape serves the controller's
# own health signals (sozu_gw_controller_*: last successful reconcile,
# failures, shadow resets) and pulls Sōzu's data-plane metrics over the
# command socket (Sōzu has no native /metrics endpoint). Off by default.
metrics:
  enabled: false
  port: 9100              # container port + ClusterIP Service port for /metrics
  serviceMonitor:
    enabled: false        # requires the Prometheus Operator (monitoring.coreos.com)
    interval: 30s
    additionalLabels: {}  # e.g. { release: kube-prometheus-stack } to match the operator's selector

rbac:
  # Grant ingresses/status so the controller can publish the gateway's
  # LoadBalancer address into each Ingress's .status (the ADDRESS column, read by
  # external-dns &co). When on, the chart also points the controller at its own
  # Service via SOZU_GW_PUBLISH_SERVICE. Off by default for least-privilege.
  allowStatusWrites: false
  # Grant gatewayclasses/gateways/httproutes status writes. Unlike the optional
  # Ingress LB-address write above, status conditions are integral to the
  # Gateway API — they ARE its UX (Accepted/Programmed/ResolvedRefs) — so this
  # defaults to on. Turn it off for least-privilege deployments that accept
  # degraded status; the chart then also tells the controller to skip the
  # writes (they are best-effort either way).
  allowGatewayStatusWrites: true

# Sōzu data-plane sidecar. Unprivileged listener ports (no root / NET_BIND).
sozu:
  httpPort: 8080
  httpsPort: 8443
  workerCount: 2
  logLevel: info

service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  # Client-facing ports on the LoadBalancer (mapped to sozu.httpPort/httpsPort
  # in the pod). These are also the ports Gateway API listeners must declare
  # (`listeners[].port`); the chart wires them to the controller as the
  # advertised gateway ports.
  httpPort: 80
  httpsPort: 443
  annotations: {}

# Layer-4 (TCP/UDP) passthrough. Each entry maps a gateway port to a Service;
# the port is exposed on the LoadBalancer and routed by Sōzu (one port → one
# Service, no host routing). Ports must be > 1024 (the data plane runs
# unprivileged). Enabling either map grants the controller ConfigMap read access
# and points it at the rendered map(s).
l4:
  tcpServices: {}   # "5432": "demo/postgres:5432"
  udpServices: {}   # "5353": "demo/coredns:53"

# Both containers run as this uid so they can share the command socket on the
# emptyDir volume.
runAsUser: 1000

# Modest default *requests* only: without them the Pod lands in the
# BestEffort QoS class and the gateway is the first thing evicted under node
# pressure. Limits are deliberately left unset — requests alone fix the
# QoS/eviction class, while a CPU limit would throttle the data path under
# load. Override freely (and add limits if your platform mandates them).
resources:
  controller:
    requests:
      cpu: 100m
      memory: 128Mi
  sozu:
    requests:
      cpu: 250m
      memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
