# HTTPRoute RequestRedirect filter (Gateway API) — a redirect-only route.
#
# A redirect rule has NO backendRef (the Gateway API forbids combining them):
# Sōzu answers the redirect itself, so no Deployment/Service is needed here.
#   scheme + statusCode are supported; host/path/port targets are not yet.
#
# Verify:
#   curl -i -H 'Host: old.example.com' http://<lb-ip>/
#   # HTTP/1.1 301 Moved Permanently
#   # Location: https://old.example.com/
#
# Requires the Gateway API CRDs installed in the cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: sozu-examples
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: sozu
spec:
  controllerName: sozu.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: examples-gw
  namespace: sozu-examples
spec:
  gatewayClassName: sozu
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect
  namespace: sozu-examples
spec:
  parentRefs:
    - name: examples-gw
      sectionName: http
  hostnames: ["old.example.com"]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
