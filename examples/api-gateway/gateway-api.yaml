# Demo app exposed via the Gateway API: a GatewayClass owned by this controller,
# a Gateway with HTTP + HTTPS listeners, an HTTPRoute that also exercises Phase 3
# filters (header edits), and a redirect-only HTTPRoute (HTTP -> HTTPS). The TLS
# Secret `app-tls` must exist in the gateway namespace (the e2e creates it from a
# self-signed cert). Requires the Gateway API CRDs to be installed in the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: sozu-demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: whoami }
  template:
    metadata:
      labels: { app: whoami }
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          args: ["--port=8000"]
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket: { port: http }
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: sozu-demo
spec:
  selector: { app: whoami }
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: sozu
spec:
  controllerName: sozu.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw
  namespace: sozu-demo
spec:
  gatewayClassName: sozu
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces: { from: Same }
    - name: https
      protocol: HTTPS
      port: 443
      hostname: app.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: app-tls
      allowedRoutes:
        namespaces: { from: Same }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
  namespace: sozu-demo
spec:
  parentRefs:
    - name: gw
  hostnames: ["app.example.com"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Phase 3 filters: inject a request header (echoed back by whoami) and a
      # response header. Sōzu has no header "append", so `add` is applied as set.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Env
                value: prod
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Served-By
                value: sozu
      backendRefs:
        - name: whoami
          port: 80
---
# A redirect-only route: HTTP -> HTTPS, 301. RequestRedirect must NOT carry a
# backendRef (the Gateway API forbids it); Sōzu answers the redirect itself.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-redirect
  namespace: sozu-demo
spec:
  parentRefs:
    - name: gw
      sectionName: http
  hostnames: ["legacy.example.com"]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
