# cert-manager with the Gateway API (automatic TLS for a Gateway listener).
#
# Annotate the Gateway with an issuer and reference a Secret from the HTTPS
# listener's `certificateRefs`: cert-manager provisions the certificate for the
# listener hostname and writes it into that Secret, which this controller loads
# and serves (SNI). Requires:
#   - the Gateway API CRDs,
#   - cert-manager with Gateway API support
#     (`--feature-gates=ExperimentalGatewayAPISupport=true`),
#   - a ClusterIssuer named `letsencrypt-prod` (adjust to yours).
#
# Verify (after issuance):
#   kubectl -n sozu-demo get secret shop-gw-tls         # populated by cert-manager
#   curl -k --resolve shop-gw.example.com:443:<lb-ip> https://shop-gw.example.com/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-gw
  template:
    metadata:
      labels:
        app: shop-gw
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          args: ["--port=8000"]
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  selector:
    app: shop-gw
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: sozu
spec:
  controllerName: sozu.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-cm
  namespace: sozu-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: sozu
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: shop-gw.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: shop-gw-tls       # cert-manager creates and fills this
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  parentRefs:
    - name: gw-cm
  hostnames: ["shop-gw.example.com"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: shop-gw
          port: 80
