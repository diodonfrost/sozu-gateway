# HTTPRoute header filters (Gateway API).
#
#   RequestHeaderModifier  -> edits headers the backend receives
#   ResponseHeaderModifier -> edits headers the client receives
# Note: Sōzu has no header "append", so a Gateway `add` is applied as a set.
#
# Verify (whoami echoes the request it got):
#   curl -s   -H 'Host: headers.example.com' http://<lb-ip>/ | grep X-Env       # X-Env: prod
#   curl -sD- -H 'Host: headers.example.com' http://<lb-ip>/ | grep X-Served-By # X-Served-By: sozu
#
# Requires the Gateway API CRDs installed in the cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: sozu-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-headers
  namespace: sozu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-headers
  template:
    metadata:
      labels:
        app: echo-headers
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          args: ["--port=8000"]
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: echo-headers
  namespace: sozu-demo
spec:
  selector:
    app: echo-headers
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: sozu
spec:
  controllerName: sozu.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: examples-gw
  namespace: sozu-demo
spec:
  gatewayClassName: sozu
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headers
  namespace: sozu-demo
spec:
  parentRefs:
    - name: examples-gw
  hostnames: ["headers.example.com"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Env
                value: prod
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Served-By
                value: sozu
      backendRefs:
        - name: echo-headers
          port: 80
