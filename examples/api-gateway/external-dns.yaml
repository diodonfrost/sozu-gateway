# external-dns with the Gateway API.
#
# external-dns's gateway-httproute source turns an HTTPRoute's hostnames into DNS
# records pointing at the parent Gateway's `.status.addresses` — which this
# controller fills from the gateway's LoadBalancer. So you need status write-back
# enabled:
#
#   helm upgrade ... --set rbac.allowStatusWrites=true
#
# and external-dns running with `--source=gateway-httproute`. Requires the
# Gateway API CRDs.
#
# Verify the prerequisite (this controller's side):
#   kubectl -n sozu-demo get gateway gw-edns -o jsonpath='{.status.addresses}'
#   # -> [{"type":"IPAddress","value":"<lb-ip>"}]  (what external-dns reads)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-gw
  template:
    metadata:
      labels:
        app: shop-gw
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          args: ["--port=8000"]
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  selector:
    app: shop-gw
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: sozu
spec:
  controllerName: sozu.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-edns
  namespace: sozu-demo
spec:
  gatewayClassName: sozu
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shop-gw
  namespace: sozu-demo
spec:
  parentRefs:
    - name: gw-edns
  hostnames: ["shop-gw.example.com"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: shop-gw
          port: 80
