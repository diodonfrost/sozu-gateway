# Demo app for the e2e: a 2-replica whoami behind a Service, exposed via an
# Ingress of class "sozu" with TLS. The TLS Secret `app-tls` must exist in the
# same namespace (the e2e target creates it from a self-signed cert).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: sozu-demo
spec:
  replicas: 2
  selector:
    matchLabels: { app: whoami }
  template:
    metadata:
      labels: { app: whoami }
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          args: ["--port=8000"]
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket: { port: http }
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: sozu-demo
spec:
  selector: { app: whoami }
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: sozu-demo
spec:
  ingressClassName: sozu
  tls:
    - hosts: ["app.example.com"]
      secretName: app-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
