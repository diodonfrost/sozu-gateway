[package]
name = "sozu-gw-gateway-api"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish.workspace = true

# Gateway API CRD types, generated from the upstream v1.2.1 standard-channel CRDs
# with `kopium` (see crates/gateway-api/README.md). Types only — `kube` is pulled
# for the `CustomResource` derive (Resource impl), not for any client/runtime.
[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
k8s-openapi = { version = "0.28", features = ["v1_36"] }
kube = { version = "4", features = ["derive"] }
